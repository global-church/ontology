name: Build & Deploy Ontology Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.16.2)'
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate ontology parses correctly
        run: |
          pip install "rdflib>=7.0,<8.0"
          python3 -c "
          from rdflib import Graph
          g = Graph()
          g.parse('core.ttl', format='turtle')
          print(f'core.ttl: {len(g)} triples - OK')
          s = Graph()
          s.parse('core.shacl.ttl', format='turtle')
          print(f'core.shacl.ttl: {len(s)} triples - OK')
          for f in sorted(__import__('pathlib').Path('data/seed').glob('*.ttl')):
              sg = Graph()
              sg.parse(str(f), format='turtle')
              print(f'{f.name}: {len(sg)} triples - OK')
          "

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install "pylode==3.2.3" "rdflib>=7.0,<8.0"

      - name: Pull Widoco Docker image
        run: docker pull ghcr.io/dgarijo/widoco:latest
        continue-on-error: true

      - name: Build documentation
        run: bash scripts/build-docs.sh --version ${{ inputs.version || github.ref_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ontology-docs
          path: docs/site/

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
