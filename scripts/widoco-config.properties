abstract=The Global.Church Core Ontology provides a shared schema for mission organizations, church networks, and denominations to coordinate around shared data. Built on W3C PROV-O as the core type system with DOLCE as a design coherence heuristic. Defines 27 OWL classes and ~146 properties covering people groups, organizations, engagement activities, and mission resources.
introduction=Global.Church is building shared infrastructure for the global church. This ontology defines the classes, properties, and constraints that enable independent organizations to publish and consume interoperable data about people groups, organizations, engagement activities, and mission resources.
